name: deploy-app

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/deploy-app.yml"
  workflow_dispatch:

concurrency:
  group: deploy-app
  cancel-in-progress: false

env:
  PROJECT_ID: time-279118
  REGION: us-central1
  REPO: scarab-paint-preview
  IMAGE_NAME: app
  SERVICE_NAME: scarab-paint-preview
  WIF_PROVIDER: projects/${{ vars.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  DEPLOYER_SA: paint-preview-deployer@time-279118.iam.gserviceaccount.com

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check repo variable is set
        env:
          PROJECT_NUMBER: ${{ vars.GCP_PROJECT_NUMBER }}
        run: |
          if [ -z "$PROJECT_NUMBER" ]; then
            echo "::error::Repo variable GCP_PROJECT_NUMBER is not set. Run: gh variable set GCP_PROJECT_NUMBER --body=\$(gcloud projects describe \$PROJECT_ID --format='value(projectNumber)')"
            exit 1
          fi

      - uses: actions/checkout@v6

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Build and push image
        id: build
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO}/${IMAGE_NAME}:${GITHUB_SHA}"
          docker build -t "$IMAGE" web/
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Deploy new revision to Cloud Run
        env:
          IMAGE: ${{ steps.build.outputs.image }}
        run: |
          gcloud run deploy "$SERVICE_NAME" \
            --image="$IMAGE" \
            --region="$REGION" \
            --quiet

      - name: Print service URL
        run: |
          gcloud run services describe "$SERVICE_NAME" \
            --region="$REGION" \
            --format='value(status.url)'
