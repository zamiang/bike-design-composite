name: lint

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  python:
    name: Python (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install ruff==0.15.14
      - name: ruff check
        run: ruff check web/ work/
      - name: ruff format --check
        run: ruff format --check web/ work/

  templates:
    name: Templates (djlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install djlint==1.36.4
      - name: djlint --check
        run: djlint web/templates --check
      - name: djlint --lint
        run: djlint web/templates --lint
