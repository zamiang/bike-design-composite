name: infra-plan

on:
  pull_request:
    paths:
      - "infra/**"
      - ".github/workflows/infra-plan.yml"

permissions:
  contents: read
  pull-requests: write
  id-token: write

env:
  PROJECT_ID: time-279118
  WIF_PROVIDER: projects/${{ vars.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  DEPLOYER_SA: paint-preview-deployer@time-279118.iam.gserviceaccount.com

jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - name: Check repo variable is set
        env:
          PROJECT_NUMBER: ${{ vars.GCP_PROJECT_NUMBER }}
        run: |
          if [ -z "$PROJECT_NUMBER" ]; then
            echo "::error::Repo variable GCP_PROJECT_NUMBER is not set."
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SA }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Terraform init
        working-directory: infra
        run: terraform init -input=false

      - name: Terraform plan
        id: plan
        working-directory: infra
        run: |
          set +e
          terraform plan -input=false -no-color -out=tfplan > plan.txt 2>&1
          status=$?
          {
            echo "exitcode=$status"
            echo "plan<<PLAN_EOF"
            cat plan.txt
            echo "PLAN_EOF"
          } >> "$GITHUB_OUTPUT"
          exit $status

      - name: Post plan as PR comment
        if: always()
        uses: actions/github-script@v7
        env:
          PLAN: ${{ steps.plan.outputs.plan }}
          STATUS: ${{ steps.plan.outputs.exitcode }}
        with:
          script: |
            const plan = process.env.PLAN || '(no plan output)';
            const status = process.env.STATUS;
            const truncated = plan.length > 60000 ? plan.slice(0, 60000) + '\n... (truncated)' : plan;
            const marker = '<!-- infra-plan -->';
            const body = `${marker}\n## Terraform plan (exit ${status})\n\n\`\`\`\n${truncated}\n\`\`\``;
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                ...context.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: context.issue.number,
                body,
              });
            }
