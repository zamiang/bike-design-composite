name: deploy

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "infra/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  PROJECT_ID: time-279118
  REGION: us-central1
  REPO: scarab-paint-preview
  IMAGE_NAME: app
  # Replace PROJECT_NUMBER below with `gcloud projects describe time-279118 --format='value(projectNumber)'`
  WIF_PROVIDER: projects/PROJECT_NUMBER/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  DEPLOYER_SA: paint-preview-deployer@time-279118.iam.gserviceaccount.com

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Build and push image
        id: build
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO}/${IMAGE_NAME}:${GITHUB_SHA}"
          docker build -t "$IMAGE" web/
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Terraform init
        working-directory: infra
        run: terraform init -input=false

      - name: Terraform apply
        working-directory: infra
        env:
          TF_VAR_image: ${{ steps.build.outputs.image }}
        run: terraform apply -input=false -auto-approve

      - name: Print service URL
        working-directory: infra
        run: terraform output -raw service_url
