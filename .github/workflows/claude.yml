name: claude

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

env:
  WIF_PROVIDER: projects/${{ vars.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  REVIEWER_SA: claude-reviewer@time-279118.iam.gserviceaccount.com
  ANTHROPIC_VERTEX_PROJECT_ID: time-279118
  CLOUD_ML_REGION: us-east5

jobs:
  claude:
    # Only trusted collaborators can invoke @claude. The workflow holds
    # contents:write, so a comment from a fork contributor must not trigger it.
    # author_association is the commenter's relationship to *this* repo.
    if: |
      (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude') &&
          (github.event.comment.author_association == 'OWNER' ||
           github.event.comment.author_association == 'MEMBER' ||
           github.event.comment.author_association == 'COLLABORATOR')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude') &&
          (github.event.comment.author_association == 'OWNER' ||
           github.event.comment.author_association == 'MEMBER' ||
           github.event.comment.author_association == 'COLLABORATOR')) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude') &&
          (github.event.review.author_association == 'OWNER' ||
           github.event.review.author_association == 'MEMBER' ||
           github.event.review.author_association == 'COLLABORATOR')) ||
        (github.event_name == 'issues' &&
          (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')) &&
          (github.event.issue.author_association == 'OWNER' ||
           github.event.issue.author_association == 'MEMBER' ||
           github.event.issue.author_association == 'COLLABORATOR'))
      )
    runs-on: ubuntu-latest
    steps:
      - name: Check repo variable is set
        env:
          PROJECT_NUMBER: ${{ vars.GCP_PROJECT_NUMBER }}
        run: |
          if [ -z "$PROJECT_NUMBER" ]; then
            echo "::error::Repo variable GCP_PROJECT_NUMBER is not set."
            exit 1
          fi

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.REVIEWER_SA }}

      - uses: anthropics/claude-code-action@v1
        with:
          use_vertex: "true"
          claude_args: "--model claude-sonnet-4-5"
