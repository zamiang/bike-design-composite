{% extends "_base.html" %}
{% block title %}Sign in · Scarab Paint Preview{% endblock %}
{% block body %}
  <div class="login-frame">
    <div class="login-card">
      <p class="eyebrow">Private</p>
      <h1>Sign in.</h1>
      <p class="lede">For Scarab customers previewing a custom paint build.</p>
      <form method="post" action="/login">
        <label class="field">
          <span class="field-label">Password</span>
          <input type="password" name="password" autofocus required>
        </label>
        {% if error %}<div class="err">That password didn&rsquo;t match.</div>{% endif %}
        <button type="submit" class="btn-primary">
          Continue <span class="arrow" aria-hidden="true">→</span>
        </button>
      </form>
    </div>
  </div>
{% endblock %}
